    <!-- ═══════════════════════════════════════════
         DONNÉES STRUCTURÉES JSON-LD
         → SoftwareApplication + FAQPage
         → Génère des rich snippets dans Google
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "Le Compagnon D&D",
          "url": "https://le-compagnon-dnd.fr",
          "description": "Application web pour gérer vos parties de Donjons & Dragons 5e en français : fiches de personnage, combats automatisés, sorts, loots et campagnes.",
          "applicationCategory": "GameApplication",
          "operatingSystem": "Web, iOS, Android",
          "inLanguage": "fr",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "EUR",
            "description": "Essai gratuit 15 jours, toutes fonctionnalités, sans carte bancaire"
          }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Est-ce que c'est gratuit au début ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Oui. 15 jours d'essai, toutes fonctionnalités, sans carte bancaire."
              }
            },
            {
              "@type": "Question",
              "name": "Est-ce que c'est comme Roll20 ou Foundry ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Non. Le Compagnon n'est pas une table virtuelle (VTT). C'est un assistant intelligent pour vos parties en présentiel ou en vocal, conçu pour fluidifier le jeu, pas pour gérer des cartes tactiques complexes."
              }
            },
            {
              "@type": "Question",
              "name": "Est-ce que ça fonctionne hors ligne ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Non. L'app est 100% en ligne, pour garantir une navigation rapide, fluide, et à jour. Cependant, une fois installée en tant qu'App (PWA), elle offre une expérience très proche du natif."
              }
            },
            {
              "@type": "Question",
              "name": "Est-ce compatible mobile, tablette et PC ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Oui. Vous pouvez y accéder depuis n'importe quel appareil connecté. L'interface s'adapte automatiquement."
              }
            },
            {
              "@type": "Question",
              "name": "Et si j'ai un bug ou un souci ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Une équipe réactive est disponible via le support. Les abonnés Célestes bénéficient d'un support prioritaire."
              }
            }
          ]
        }
      ]
    }
    </script>

    <!-- Point d'entrée Vite -->
    <script type="module">
      console.log('[BOOT] Pré-main');
      window.addEventListener('error', (e) => {
        console.log('[GLOBAL ERROR]', e.error || e.message, e);
      });
      window.addEventListener('unhandledrejection', (e) => {
        console.log('[GLOBAL UNHANDLED REJECTION]', e.reason);
      });
      window.__APP_DIAGNOSTIC__ = {
        ts: Date.now(),
        mode: import.meta.env.MODE,
        standalone: window.matchMedia?.('(display-mode: standalone)')?.matches
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      const checkDisplayMode = () => {
        const standalone = window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
        console.log('[DISPLAY MODE]', standalone ? 'standalone' : 'browser');
      };
      checkDisplayMode();
      window.matchMedia('(display-mode: standalone)').addEventListener('change', checkDisplayMode);
    </script>
